<svg xmlns="http://www.w3.org/2000/svg" width="480" height="320" viewBox="0 0 480 320">
  <title>Crack band  dried earth reference (designer sketch)</title>
  <rect width="480" height="320" fill="#3a2e28"/>
  <rect x="0" y="0" width="480" height="80" fill="#5c4033" opacity="0.35"/>
  <text x="12" y="22" fill="#d8c4a8" font-family="sans-serif" font-size="13">Crack band texture reference  dried / crumbling earth</text>
  <text x="12" y="40" fill="#a89888" font-family="sans-serif" font-size="11">Dark fractures over darkened team color; irregular rear edge (not ruler-straight)</text>
  <!-- Irregular crack network -->
  <g stroke="#1a1410" stroke-width="2.2" fill="none" stroke-linecap="round">
    <path d="M40 120 L95 145 L120 110 L180 130 L210 95 L260 125 L300 100 L360 140 L420 115"/>
    <path d="M60 180 L110 160 L150 195 L200 170 L250 200 L310 175 L370 210 L440 185"/>
    <path d="M80 240 L130 220 L170 250 L230 230 L280 255 L340 235 L400 260"/>
    <path d="M95 145 L110 160 L150 195"/>
    <path d="M210 95 L200 170"/>
    <path d="M300 100 L310 175 L280 255"/>
    <path d="M120 110 L110 160"/>
    <path d="M360 140 L370 210"/>
  </g>
  <g stroke="#2a2018" stroke-width="1" fill="none" opacity="0.7">
    <path d="M70 130 L88 138 M175 118 L192 128 M295 108 L312 118"/>
    <path d="M145 188 L162 198 M325 168 L342 178"/>
  </g>
  <!-- Band depth annotation -->
  <rect x="24" y="88" width="200" height="72" fill="#6b4a3a" opacity="0.55" stroke="#8a6a55" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="32" y="108" fill="#e8dcc8" font-family="sans-serif" font-size="10">crack band (rearward growth)</text>
  <line x1="24" y1="160" x2="224" y2="160" stroke="#c9a882" stroke-width="1.5"/>
  <text x="32" y="178" fill="#c9a882" font-family="sans-serif" font-size="10">engaged front edge (anchor)</text>
  <polygon points="220,156 232,160 220,164" fill="#c9a882"/>
</svg>
